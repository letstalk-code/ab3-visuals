<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AB3 Visuals — Blog Admin</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'letstalk-code/ab3-visuals',
          branch: 'main',
          base_url: 'https://ab3visuals.vercel.app',
          auth_endpoint: '/api/auth'
        },
        media_folder: 'images/blog',
        public_folder: '/images/blog',
        collections: [
          {
            name: 'posts',
            label: 'Blog Posts',
            folder: 'posts',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            fields: [
              { label: 'Title',        name: 'title',       widget: 'string' },
              { label: 'Publish Date', name: 'date',        widget: 'datetime', format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false },
              { label: 'Cover Image',  name: 'coverImage',  widget: 'image',    required: false },
              { label: 'Excerpt',      name: 'excerpt',     widget: 'text' },
              { label: 'Category',     name: 'category',    widget: 'select',   options: ['Real Estate', 'Aerial & Drone', 'Video Marketing', 'Virtual Staging', 'Tips & Guides'] },
              { label: 'Body',         name: 'body',        widget: 'markdown' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
